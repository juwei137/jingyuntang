        <p style="color:#666; line-height:1.8; margin-bottom:20px;">
            为京剧爱好者提供丰富的学习资源，包括音频、视频、曲谱、文献资料等，满足不同层次的学习需求。

        <div class="card-container">
            <div class="card">
                <img src="../images/京剧音频.png" alt="音频资源" class="card-img">

                  <h3 class="card-title">经典唱段音频</h3>

            </div>
            <div class="card">
                <img src="../images/京剧剧目.png" alt="视频资源" class="card-img">

                <div class="card-content">

                </div>
            </div>
        </div>
    </section>
	
	<script>
        document.querySelector('.search-btn').addEventListener('click', function() {
            const searchText = document.querySelector('.search-input').value.trim();
            if (!searchText) {
                alert('请输入搜索内容');
                return;
            }
            alert(`正在搜索：${searchText}，找到相关结果`);
        });
        document.querySelector('.search-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.querySelector('.search-btn').click();
            }
        });
    </script>
